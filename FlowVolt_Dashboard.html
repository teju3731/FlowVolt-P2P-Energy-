<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlowVolt — P2P Energy Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #050d0d;
    --panel:     #0a1a1a;
    --panel2:    #0f2020;
    --border:    #1a3a3a;
    --green:     #00ff88;
    --green2:    #00cc6a;
    --cyan:      #00e5ff;
    --amber:     #ffab00;
    --red:       #ff4444;
    --text:      #e0f5ee;
    --muted:     #5a8a7a;
    --glow:      0 0 20px #00ff8840;
    --glow-lg:   0 0 40px #00ff8850;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{
    content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse at 20% 0%,#003322 0%,transparent 50%),
               radial-gradient(ellipse at 80% 100%,#002233 0%,transparent 50%);
    pointer-events:none;z-index:0
  }
  #root{position:relative;z-index:1}

  /* Layout */
  .app{display:flex;min-height:100vh}
  .sidebar{width:240px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
  .main{margin-left:240px;flex:1;padding:32px}

  /* Sidebar */
  .logo{padding:28px 24px;border-bottom:1px solid var(--border)}
  .logo-mark{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--green);letter-spacing:-1px;text-shadow:var(--glow)}
  .logo-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
  .nav{padding:20px 0;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;cursor:pointer;transition:.2s;border-left:3px solid transparent;font-size:14px;font-weight:600;letter-spacing:.5px;color:var(--muted)}
  .nav-item:hover{background:var(--panel2);color:var(--text)}
  .nav-item.active{background:var(--panel2);color:var(--green);border-left-color:var(--green)}
  .nav-icon{font-size:18px;width:22px;text-align:center}
  .wallet-box{margin:20px;padding:16px;background:var(--panel2);border:1px solid var(--border);border-radius:12px}
  .wallet-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .wallet-addr{font-family:'Space Mono',monospace;font-size:11px;color:var(--green);word-break:break-all}
  .connect-btn{width:100%;padding:10px;background:var(--green);color:#000;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:.2s;letter-spacing:.5px}
  .connect-btn:hover{background:var(--green2);box-shadow:var(--glow)}
  .disconnect-btn{width:100%;padding:8px;background:transparent;color:var(--red);border:1px solid var(--red)44;border-radius:8px;font-size:12px;cursor:pointer;margin-top:8px;font-family:'Syne',sans-serif}

  /* Page Header */
  .page-header{margin-bottom:32px}
  .page-title{font-size:32px;font-weight:800;letter-spacing:-1px}
  .page-title span{color:var(--green)}
  .page-sub{color:var(--muted);font-size:14px;margin-top:4px}
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:#00ff8815;border:1px solid #00ff8830;padding:4px 12px;border-radius:100px;font-size:12px;color:var(--green);font-family:'Space Mono',monospace;margin-top:10px}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(0.8)}}

  /* Stat Cards */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .stat-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;overflow:hidden;transition:.3s}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .stat-card.green::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
  .stat-card.amber::before{background:linear-gradient(90deg,var(--amber),#ff8c00)}
  .stat-card.cyan::before{background:linear-gradient(90deg,var(--cyan),#0088ff)}
  .stat-card.red::before{background:linear-gradient(90deg,var(--red),#ff8844)}
  .stat-card:hover{border-color:var(--green)44;transform:translateY(-2px)}
  .stat-icon{font-size:28px;margin-bottom:10px}
  .stat-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .stat-value{font-size:28px;font-weight:800;letter-spacing:-1px}
  .stat-value.green{color:var(--green)}
  .stat-value.amber{color:var(--amber)}
  .stat-value.cyan{color:var(--cyan)}
  .stat-value.red{color:var(--red)}
  .stat-delta{font-size:12px;color:var(--muted);margin-top:4px;font-family:'Space Mono',monospace}
  .stat-delta.up{color:var(--green)}
  .stat-delta.dn{color:var(--red)}

  /* Grid rows */
  .grid-2{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px}
  .grid-full{margin-bottom:20px}

  /* Panel */
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px}
  .panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .panel-title{font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text)}
  .panel-badge{font-family:'Space Mono',monospace;font-size:11px;padding:4px 10px;border-radius:100px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}

  /* Chart (CSS-only bar chart) */
  .bar-chart{display:flex;align-items:flex-end;gap:4px;height:100px}
  .bar{flex:1;border-radius:4px 4px 0 0;min-height:2px;transition:.5s}
  .bar.solar{background:linear-gradient(180deg,var(--green),var(--green2))}
  .bar.consumption{background:linear-gradient(180deg,var(--amber),#cc8800)}
  .bar.surplus{background:linear-gradient(180deg,var(--cyan),#0088cc)}
  .chart-labels{display:flex;gap:4px;margin-top:6px}
  .chart-label{flex:1;text-align:center;font-size:9px;color:var(--muted);font-family:'Space Mono',monospace}
  .chart-legend{display:flex;gap:16px;margin-top:12px}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .legend-dot{width:8px;height:8px;border-radius:2px}

  /* Live Feed Table */
  .feed-table{width:100%;border-collapse:collapse}
  .feed-table th{text-align:left;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:8px 12px;border-bottom:1px solid var(--border)}
  .feed-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid #0f2020;vertical-align:middle}
  .feed-table tr:hover td{background:var(--panel2)}
  .mono{font-family:'Space Mono',monospace}
  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700}
  .badge.solar{background:#00ff8820;color:var(--green);border:1px solid #00ff8840}
  .badge.wind{background:#00e5ff20;color:var(--cyan);border:1px solid #00e5ff40}
  .badge.buy{background:#ffab0020;color:var(--amber);border:1px solid #ffab0040}
  .badge.sell{background:#00ff8820;color:var(--green);border:1px solid #00ff8840}
  .badge.confirmed{background:#00ff8815;color:var(--green)}
  .badge.pending{background:#ffab0015;color:var(--amber)}

  /* Marketplace */
  .market-toolbar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .search-box{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;min-width:200px}
  .search-box:focus{border-color:var(--green)66}
  .filter-btn{padding:10px 18px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;cursor:pointer;transition:.2s;font-weight:600}
  .filter-btn.active,.filter-btn:hover{border-color:var(--green);color:var(--green);background:#00ff8810}
  .listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .listing-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;transition:.3s;cursor:pointer;position:relative;overflow:hidden}
  .listing-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#00ff8808,transparent);opacity:0;transition:.3s;pointer-events:none}
  .listing-card:hover{border-color:var(--green)66;transform:translateY(-3px);box-shadow:0 8px 32px #00ff8820}
  .listing-card:hover::after{opacity:1}
  .listing-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:16px}
  .listing-addr{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted)}
  .listing-amount{font-size:36px;font-weight:800;color:var(--green);letter-spacing:-2px}
  .listing-unit{font-size:14px;color:var(--muted);font-weight:400}
  .listing-price{font-size:20px;font-weight:700;color:var(--amber);margin:8px 0}
  .listing-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
  .buy-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--green),var(--cyan));border:none;border-radius:10px;color:#000;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:.2s;letter-spacing:.5px}
  .buy-btn:hover{box-shadow:var(--glow-lg);transform:scale(1.02)}
  .buy-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
  .list-form{background:var(--panel2);border:1px solid var(--green)33;border-radius:14px;padding:24px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .form-input{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;outline:none;transition:.2s}
  .form-input:focus{border-color:var(--green)66}
  .primary-btn{padding:12px 24px;background:var(--green);color:#000;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:.2s}
  .primary-btn:hover{background:var(--green2);box-shadow:var(--glow)}

  /* Wallet Page */
  .wallet-hero{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--green)33;border-radius:20px;padding:32px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
  .wallet-hero::before{content:'';position:absolute;inset:-50%;background:radial-gradient(circle,#00ff8808 0%,transparent 70%);animation:rotate 10s linear infinite}
  @keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .wallet-hero-content{position:relative;z-index:1}
  .wallet-balance{font-size:64px;font-weight:800;color:var(--green);letter-spacing:-3px;text-shadow:var(--glow-lg)}
  .wallet-balance-label{font-size:14px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .eth-balance{font-family:'Space Mono',monospace;font-size:18px;color:var(--cyan);margin-top:8px}
  .tx-list{display:flex;flex-direction:column;gap:10px}
  .tx-item{display:flex;align-items:center;gap:16px;padding:14px 18px;background:var(--panel2);border:1px solid var(--border);border-radius:12px;transition:.2s}
  .tx-item:hover{border-color:var(--green)44}
  .tx-icon{font-size:24px;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--panel)}
  .tx-details{flex:1}
  .tx-type{font-weight:700;font-size:14px}
  .tx-hash{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
  .tx-amount{text-align:right}
  .tx-amount .value{font-size:18px;font-weight:700;font-family:'Space Mono',monospace}
  .tx-amount .value.in{color:var(--green)}
  .tx-amount .value.out{color:var(--red)}
  .tx-amount .time{font-size:11px;color:var(--muted)}

  /* Analytics */
  .analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
  .area-chart{height:140px;position:relative;overflow:hidden}
  .area-svg{width:100%;height:100%}
  .donut-wrap{display:flex;align-items:center;gap:24px}
  .donut-chart{position:relative;width:120px;height:120px;flex-shrink:0}
  .donut-svg{width:120px;height:120px}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut-pct{font-size:24px;font-weight:800;color:var(--green)}
  .donut-sub{font-size:10px;color:var(--muted)}
  .donut-legend{flex:1;display:flex;flex-direction:column;gap:10px}
  .donut-item{display:flex;justify-content:space-between;align-items:center;font-size:13px}
  .donut-bar{flex:1;height:4px;border-radius:2px;margin:0 12px;background:var(--border)}
  .donut-bar-fill{height:100%;border-radius:2px}

  /* Audit Log */
  .audit-table{width:100%;border-collapse:collapse}
  .audit-table th{text-align:left;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace}
  .audit-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid #0a1818;vertical-align:middle}
  .audit-table tr:hover td{background:var(--panel2)}
  .hash-cell{font-family:'Space Mono',monospace;font-size:11px;color:var(--cyan)}
  .from-to{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)}

  /* Notification */
  .notif{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--green);border-radius:12px;padding:16px 20px;z-index:999;animation:slideIn .3s ease;max-width:320px;box-shadow:var(--glow)}
  .notif-title{font-weight:700;color:var(--green);margin-bottom:4px}
  .notif-msg{font-size:13px;color:var(--muted)}
  @keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:#00000088;backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center}
  .modal{background:var(--panel);border:1px solid var(--green)44;border-radius:20px;padding:32px;width:400px;max-width:95vw}
  .modal-title{font-size:22px;font-weight:800;margin-bottom:6px}
  .modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
  .modal-summary{background:var(--panel2);border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid var(--border)}
  .modal-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:14px}
  .modal-row:not(:last-child){border-bottom:1px solid var(--border)}
  .modal-total{font-weight:700;color:var(--green)}
  .modal-btns{display:flex;gap:12px}
  .cancel-btn{flex:1;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-weight:700;cursor:pointer}

  /* Battery widget */
  .battery-outer{width:100%;height:24px;background:var(--panel2);border-radius:4px;border:1px solid var(--border);position:relative;overflow:hidden}
  .battery-fill{height:100%;border-radius:3px;transition:width .8s ease}
  .battery-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;font-weight:700}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

  /* Tooltip hover for hash */
  [title]{cursor:help}

  /* Auth */
  .auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-card{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:var(--glow-lg);position:relative;overflow:hidden}
  .auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--cyan))}
  .auth-logo{font-size:32px;font-weight:800;color:var(--green);text-align:center;margin-bottom:8px;letter-spacing:-1px}
  .auth-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
  .auth-tabs{display:flex;gap:10px;margin-bottom:24px;background:var(--panel2);padding:6px;border-radius:12px}
  .auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:8px;font-size:14px;font-weight:700;transition:.2s;color:var(--muted)}
  .auth-tab.active{background:var(--panel);color:var(--green);box-shadow:0 4px 12px #00000044}
  .auth-form{display:flex;flex-direction:column;gap:16px}
  .auth-footer{margin-top:24px;text-align:center;font-size:13px;color:var(--muted)}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  
  /* Virtual Inbox */
  .inbox-toggle{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:var(--green);color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2000;box-shadow:var(--glow-sm)}
  .inbox-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;padding:2px 6px;border-radius:100px;font-weight:800}
  .inbox-panel{position:fixed;bottom:80px;right:20px;width:320px;background:var(--panel);border:1px solid var(--border);border-radius:16px;z-index:2000;box-shadow:var(--glow-lg);overflow:hidden;display:none}
  .inbox-panel.show{display:block}
  .inbox-hd{padding:12px 16px;background:var(--panel2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .inbox-title{font-size:13px;font-weight:800;color:var(--green)}
  .inbox-list{max-height:400px;overflow-y:auto}
  .email-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s}
  .email-item:hover{background:var(--panel2)}
  .email-from{font-size:11px;color:var(--green);font-weight:700;margin-bottom:2px}
  .email-sub{font-size:12px;font-weight:700;margin-bottom:4px}
  .email-body{font-size:11px;color:var(--muted);line-height:1.4}
  .inbox-empty{padding:40px;text-align:center;color:var(--muted);font-size:12px}
  
  /* Responsive */
  @media(max-width:900px){
    .sidebar{width:60px}
    .nav-item span,.logo-sub,.logo-mark span:not(:first-child),.wallet-box{display:none}
    .main{margin-left:60px}
    .stats-grid{grid-template-columns:1fr 1fr}
    .grid-2,.analytics-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef } = React;

const CONTRACT_ADDRESS = "0x649bA3608F6430CA64e4c46c664fc136B510cD72";
const SEPOLIA_CHAIN_ID = "0xaa36a7"; // 11155111
const CONTRACT_ABI = [
  "function listEnergy(uint256 amount, uint256 pricePerToken) public returns (uint256)",
  "function buyEnergy(uint256 listingId, uint256 amount) public payable",
  "function getActiveListings() public view returns (tuple(uint256 listingId, address seller, uint256 energyAmount, uint256 pricePerToken, bool active, uint256 createdAt)[])",
  "function balanceOf(address account) public view returns (uint256)",
  "function mintEnergyTokens(address prosumer, uint256 amount, string source) public",
  "event TradeExecuted(uint256 indexed listingId, address indexed seller, address indexed buyer, uint256 amount, uint256 totalCost, uint256 timestamp)",
  "event EnergyListed(uint256 indexed listingId, address indexed seller, uint256 amount, uint256 pricePerToken)",
  "event EnergyMinted(address indexed prosumer, uint256 amount, uint256 timestamp, string source)"
];

// ─── Mock Data Generators ───────────────────────────────────────────────────
const rnd = (min,max,dec=2) => +(Math.random()*(max-min)+min).toFixed(dec);
const shortAddr = a => (a && typeof a === 'string' && a.length > 10) ? a.slice(0,6)+'...'+a.slice(-4) : (a || '0x...');
const ADDRS = ['0xA1b2C3d4E5f60011','0xDe45fA9823cC7712','0xF00dBa5E11223344','0xCa1e456789AbCd01','0xBe3f012345678901'];
const TXHASHES = () => '0x'+[...Array(40)].map(()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');

function makeListings(){
  return [
    {id:1,seller:ADDRS[0],amount:5,price:0.0012,source:'solar',node:'Node-A'},

function BarChart({data, height=100}){

  const hrs = data.map(d=>d.h);
  return React.createElement('div',null,
    React.createElement('div',{className:'bar-chart',style:{height}},
      data.map((d,i)=>React.createElement('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',gap:2,alignItems:'stretch',height:'100%',justifyContent:'flex-end'}},
        React.createElement('div',{className:'bar surplus',style:{height:`${(d.surplus||0)/max*100}%`}}),
        React.createElement('div',{className:'bar solar',style:{height:`${d.solar/max*100}%`}}),
        React.createElement('div',{className:'bar consumption',style:{height:`${d.cons/max*100}%`}})
      ))
    ),
    React.createElement('div',{className:'chart-labels'},
      hrs.map((h,i)=>React.createElement('div',{key:i,className:'chart-label'},h))
    ),
    React.createElement('div',{className:'chart-legend'},
      [['solar','☀️ Solar',getComputedStyle(document.documentElement).getPropertyValue('--green').trim()||'#00ff88'],
       ['consumption','🏠 Consumption','#ffab00'],
       ['surplus','⚡ Surplus','#00e5ff']].map(([k,l,c])=>
        React.createElement('div',{key:k,className:'legend-item'},
          React.createElement('div',{className:'legend-dot',style:{background:c}}),
          React.createElement('span',null,l)
        )
      )

}

function AreaChart({data,color='#00ff88'}){
  const w=400,h=140,pad=10;
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>`${pad+i*(w-2*pad)/(data.length-1)},${h-pad-((v/max)*(h-2*pad))}`).join(' ');
  const fillPts=`${pad},${h-pad} ${pts} ${pad+((data.length-1))*(w-2*pad)/(data.length-1)},${h-pad}`;
  return React.createElement('div',{className:'area-chart'},
    React.createElement('svg',{className:'area-svg',viewBox:`0 0 ${w} ${h}`,preserveAspectRatio:'none'},
      React.createElement('defs',null,
        React.createElement('linearGradient',{id:`grad_${color.replace('#','')}`,x1:'0',y1:'0',x2:'0',y2:'1'},
          React.createElement('stop',{offset:'0%',stopColor:color,stopOpacity:'0.4'}),
          React.createElement('stop',{offset:'100%',stopColor:color,stopOpacity:'0.02'})
        )
      ),
      React.createElement('polygon',{points:fillPts,fill:`url(#grad_${color.replace('#','')})` }),
      React.createElement('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:'2.5',strokeLinejoin:'round',strokeLinecap:'round'})
    )
  );
}

function DonutChart({pct,color='#00ff88',size=120}){
  const r=46,cx=60,cy=60;
  const circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  return React.createElement('div',{className:'donut-chart',style:{width:size,height:size}},
    React.createElement('svg',{className:'donut-svg',viewBox:'0 0 120 120'},
      React.createElement('circle',{cx,cy,r,fill:'none',stroke:'#1a3a3a',strokeWidth:'12'}),
      React.createElement('circle',{cx,cy,r,fill:'none',stroke:color,strokeWidth:'12',
        strokeDasharray:`${dash} ${circ-dash}`,strokeLinecap:'round',
        transform:'rotate(-90 60 60)',style:{transition:'stroke-dasharray 1s ease'}})
    ),
    React.createElement('div',{className:'donut-center'},
      React.createElement('div',{className:'donut-pct',style:{color}},pct+'%'),
      React.createElement('div',{className:'donut-sub'},'Green')
    )
  );
}

function Marketplace({wallet,notify}){
  const [listings,setListings]=useState([]);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [buyModal,setBuyModal]=useState(null);
  const [formData,setFormData]=useState({amount:'',price:''});
  const [loading, setLoading] = useState(false);

  const fetchListings = useCallback(async () => {
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
      const rawListings = await contract.getActiveListings();
      const formatted = rawListings.map((l) => ({
        id: Number(l.listingId),
        seller: l.seller,
        amount: Number(l.energyAmount),
        price: Number(l.pricePerToken),
        source: 'solar', 
        node: 'Verified Node'
      })).filter(l => l.amount > 0);
      setListings(formatted);
    } catch (e) {
      console.error("Listing fetch failed", e);
    }
  }, []);

  useEffect(() => {
    fetchListings();
    const id = setInterval(fetchListings, 15000);
    return () => clearInterval(id);
  }, [fetchListings]);

  const filtered=listings.filter(l=>{
    if(filter!=='all'&&l.source!==filter) return false;
    if(search&&!l.node.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  async function confirmBuy(){
    if(!wallet){notify('Connect Wallet','Please connect MetaMask to trade energy.');return;}
    setLoading(true);
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      const signer = await provider.getSigner();
      const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
      
      const totalCost = BigInt(buyModal.amount) * BigInt(buyModal.price);
      const tx = await contract.buyEnergy(BigInt(buyModal.id), BigInt(buyModal.amount), { value: totalCost });
      notify('Confirming...', 'Please sign the transaction in MetaMask.');
      await tx.wait();
      
      notify('Success! ⚡', `Energy bought and settled. Listing removed from marketplace.`);
      setBuyModal(null);
      fetchListings();
    } catch (e) {
      console.error("Buy failed", e);
      const reason = e.reason || e.message || "Transaction failed";
      notify("Error", reason.includes("user rejected") ? "Transaction rejected." : reason);
    } finally {
      setLoading(false);
    }
  }

  async function listEnergy(){
    if(!wallet){notify('Connect Wallet','Connect MetaMask to list energy.');return;}
    if(!formData.amount||!formData.price){notify('Error','Please fill amount and price.');return;}
    setLoading(true);
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      const signer = await provider.getSigner();
      const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
      
      // Check balance first to prevent revert
      const bal = await contract.balanceOf(wallet);
      if (BigInt(bal) < BigInt(formData.amount)) {
        notify("Insufficient Balance", `You only have ${bal} FVE on-chain. Sync your surplus from the Dashboard first.`);
        setLoading(false);
        return;
      }

      const tx = await contract.listEnergy(BigInt(formData.amount), BigInt(formData.price));
      notify('Listing...', 'Please sign the transaction in MetaMask.');
      await tx.wait();
      
      notify('Energy Listed! 🌱', `${formData.amount} kWh listed on Sepolia.`);
      setFormData({amount:'',price:''});
      fetchListings();
    } catch (e) {
      console.error("Listing failed", e);
      const reason = e.reason || e.message || "Transaction failed";
      notify("Error", reason.includes("user rejected") ? "Transaction rejected." : reason);
    } finally {
      setLoading(false);
    }
  }

  return React.createElement('div',null,
    React.createElement('div',{className:'page-header'},
      React.createElement('div',{className:'page-title'},null,'Energy ',React.createElement('span',null,'Marketplace')),
      React.createElement('div',{className:'page-sub'},'Peer-to-peer energy trading on Sepolia')
    ),
    // Sell form
    React.createElement('div',{className:'list-form',style:{marginBottom:24}},
      React.createElement('div',{style:{fontSize:14,fontWeight:700,marginBottom:16,color:'var(--green)'}},
        '⚡ List Your Surplus Energy'
      ),
      React.createElement('div',{className:'form-row'},
        React.createElement('div',{className:'form-group'},
          React.createElement('label',{className:'form-label'},'Amount (kWh tokens)'),
          React.createElement('input',{className:'form-input',type:'number',placeholder:'e.g. 5',
            value:formData.amount,onChange:e=>setFormData(p=>({...p,amount:e.target.value}))})
        ),
        React.createElement('div',{className:'form-group'},
          React.createElement('label',{className:'form-label'},'Price per kWh (Tokens)'),
          React.createElement('input',{className:'form-input',type:'number',placeholder:'e.g. 10',
            value:formData.price,onChange:e=>setFormData(p=>({...p,price:e.target.value}))})
        )
      ),
      React.createElement('button',{className:'primary-btn', disabled: loading, onClick:listEnergy}, loading ? 'Processing...' : '📋 List on Marketplace')
    ),
    // Filters
    React.createElement('div',{className:'market-toolbar'},
      React.createElement('input',{className:'search-box',placeholder:'🔍 Search by node name...',
        value:search,onChange:e=>setSearch(e.target.value)}),
      ['all','solar','wind'].map(f=>
        React.createElement('button',{key:f,className:`filter-btn ${filter===f?'active':''}`,
          onClick:()=>setFilter(f)},f==='all'?'All Sources':f==='solar'?'☀️ Solar':'💨 Wind')
      )
    ),
    // Listings
    React.createElement('div',{className:'listings-grid'},
      filtered.map(l=>
        React.createElement('div',{key:l.id,className:'listing-card'},
          React.createElement('div',{className:'listing-header'},
            React.createElement('div',null,
              React.createElement('div',{className:'listing-addr'},shortAddr(l.seller)),
              React.createElement('div',{style:{marginTop:4}},React.createElement('span',{className:`badge ${l.source}`},l.source.toUpperCase()))
            ),
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('div',{style:{fontSize:11,color:'var(--muted)'}},l.node)
            )
          ),
          React.createElement('div',{className:'listing-amount'},l.amount,React.createElement('span',{className:'listing-unit'},' kWh')),
          React.createElement('div',{className:'listing-price'},`${l.price} Tokens`,React.createElement('span',{style:{fontSize:13,color:'var(--muted)',fontWeight:400}},' / kWh')),
          React.createElement('button',{className:'buy-btn',onClick:()=>setBuyModal(l)},
            wallet?'⚡ Buy Energy':'Connect Wallet to Buy')
        )
      )
    ),
    filtered.length===0&&React.createElement('div',{style:{textAlign:'center',padding:48,color:'var(--muted)'}},'No active listings on-chain.'),
    // Buy Modal
    buyModal&&React.createElement('div',{className:'modal-bg',onClick:()=>setBuyModal(null)},
      React.createElement('div',{className:'modal',onClick:e=>e.stopPropagation()},
        React.createElement('div',{className:'modal-title'},'Confirm Trade'),
        React.createElement('div',{className:'modal-sub'},'Atomic settlement on Sepolia'),
        React.createElement('div',{className:'modal-summary'},
          [
            ['Seller',shortAddr(buyModal.seller)],
            ['Energy Amount',`${buyModal.amount} kWh`],
            ['Price per kWh',`${buyModal.price} Tokens`],
            ['Total Cost',`${(buyModal.amount*buyModal.price)} Tokens`],
          ].map(([k,v],i)=>
            React.createElement('div',{key:i,className:'modal-row'},
              React.createElement('span',{style:{color:'var(--muted)'}},k),
              React.createElement('span',{className:i===3?'modal-total mono':'mono'},v)
            )
          )
        ),
        React.createElement('div',{className:'modal-btns'},
          React.createElement('button',{className:'cancel-btn',onClick:()=>setBuyModal(null)},'Cancel'),
          React.createElement('button',{className:'buy-btn', disabled: loading, onClick:confirmBuy}, loading ? 'Confirming...' : '✅ Confirm & Pay')
        )

}

function WalletPage({wallet,setWallet,notify}){

function AuditLog(){
  const [log, setLog] = useState([]);
  const [filter, setFilter] = useState('all');

  const fetchEvents = useCallback(async () => {
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      const contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
      
      // Fetch TradeExecuted and EnergyMinted events
      const tradeFilter = contract.filters.TradeExecuted();
      const depositFilter = contract.filters.EnergyMinted();
      
      const [trades, deposits] = await Promise.all([
        contract.queryFilter(tradeFilter, -2000), 
        contract.queryFilter(depositFilter, -2000)
      ]);

      const formatted = [
        ...trades.map(t => ({
          id: t.transactionHash.slice(0, 10),
          type: 'TRADE',
          from: t.args[1], // seller
          to: t.args[2],   // buyer
          amount: t.args[3].toString(),
          price: (Number(t.args[4]) / Number(t.args[3])).toFixed(0), // unit price
          txHash: t.transactionHash,
          block: t.blockNumber,
          time: 'Confirmed'
        })),
        ...deposits.map(d => ({
          id: d.transactionHash.slice(0, 10),
          type: 'DEPOSIT',
          from: 'IoT Node',
          to: d.args[0], // prosumer
          amount: d.args[1].toString(),
          price: '0',
          txHash: d.transactionHash,
          block: d.blockNumber,
          time: 'Confirmed'
        }))
      ].sort((a, b) => b.block - a.block);

      setLog(formatted);
    } catch (e) {
      console.error("Event fetch failed", e);
      setLog([]); // Clear log on failure
    }
  }, []);

  useEffect(() => {
    fetchEvents();
    const id = setInterval(fetchEvents, 20000);
    return () => clearInterval(id);
  }, [fetchEvents]);

  const filtered = filter === 'all' ? log : log.filter(t => t.type === filter);

  return React.createElement('div',null,
    React.createElement('div',{className:'page-header'},
      React.createElement('div',{className:'page-title'},null,'Audit ',React.createElement('span',null,'Log')),
      React.createElement('div',{className:'page-sub'},'Immutable record of all P2P energy trades on Sepolia')
    ),
    React.createElement('div',{className:'panel'},
      React.createElement('div',{className:'panel-hd'},
        React.createElement('div',{className:'panel-title'},'Blockchain Transaction History'),
        React.createElement('div',{style:{display:'flex',gap:8}},
          ['all','TRADE','DEPOSIT'].map(f=>
            React.createElement('button',{key:f,
              style:{padding:'4px 12px',borderRadius:100,border:'1px solid',fontSize:12,cursor:'pointer',fontFamily:'Space Mono',
                background:filter===f?'var(--green)':'transparent',
                color:filter===f?'#000':'var(--muted)',
                borderColor:filter===f?'var(--green)':'var(--border)'},
              onClick:()=>setFilter(f)},f)
          )
        )
      ),
      React.createElement('table',{className:'audit-table'},
        React.createElement('thead',null,
          React.createElement('tr',null,
            ['Type','From','To','Amount','Price','TX Hash','Block','Status'].map(h=>
              React.createElement('th',{key:h},h)
            )
          )
        ),
        React.createElement('tbody',null,
          filtered.map(row=>
            React.createElement('tr',{key:row.id},
              React.createElement('td',null,
                React.createElement('span',{className:`badge ${row.type==='TRADE'?'buy':row.type==='DEPOSIT'?'solar':''}`},
                  row.type)
              ),
              React.createElement('td',{className:'from-to'},shortAddr(row.from)),
              React.createElement('td',{className:'from-to'},shortAddr(row.to)),
              React.createElement('td',{className:'mono',style:{color:'var(--green)',fontWeight:700}},row.amount+' kWh'),
              React.createElement('td',{className:'mono',style:{color:'var(--amber)'}},row.price+' Tokens'),
              React.createElement('td',{className:'hash-cell',title:row.txHash},shortAddr(row.txHash)+'...'),
              React.createElement('td',{className:'mono',style:{fontSize:11,color:'var(--muted)'}},row.block),
              React.createElement('td',{style:{fontSize:12,color:'var(--green)', fontWeight: 700}},row.time)
            )
          )
        )
      )
    ),
    filtered.length === 0 && React.createElement('div', {style: {textAlign: 'center', padding: 48, color: 'var(--muted)'}}, 'No recent events found on Sepolia.')
  );
}

const API_BASE = "http://localhost:5000/api";

function Auth({onAuth, notify}){
  const [mode, setMode] = useState('login'); // login | register | verify | forgot | reset
  const [formData, setFormData] = useState({email: '', password: '', name: '', nodeType: 'Solar'});
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [vCode, setVCode] = useState('');
  const [timer, setTimer] = useState(0);
  const [resends, setResends] = useState(0);

  useEffect(() => {
    let interval;
    if (timer > 0) {
      interval = setInterval(() => setTimer(prev => prev - 1), 1000);
    }
    return () => clearInterval(interval);
  }, [timer]);

  const validatePassword = (pwd) => {
    const re = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
    return re.test(pwd);
  };

  const handleAuth = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    try {
      if (mode === 'register') {
        if (!validatePassword(formData.password)) {
          setError('Password must be 8+ chars, with Uppercase, Number, and Special Char.');
          setLoading(false);
          return;
        }

        const res = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        setMode('verify');
        setTimer(300); // 5 mins
        notify('OTP Sent', 'Check your email for the verification code.');
      } else if (mode === 'login') {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: formData.email, password: formData.password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);

        localStorage.setItem('fv_current', JSON.stringify(data.user));
        onAuth(data.user);
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const handleVerify = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/verify-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: formData.email, otp: vCode, type: mode === 'verify' ? 'register' : 'reset' })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      if (mode === 'verify') {
        localStorage.setItem('fv_current', JSON.stringify(data.user));
        onAuth(data.user);
      } else {
        setMode('reset');
        notify('Verified', 'Enter your new password below.');
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const handleResend = async () => {
    if (timer > 240) return; // Prevent spamming within 1 minute
    setError('');
    try {
      const res = await fetch(`${API_BASE}/resend-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: formData.email })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      setTimer(300);
      setResends(prev => prev + 1);
      notify('Code Resent', 'A new code has been sent to your email.');
    } catch (err) {
      setError(err.message);
    }
  };

  const handleForgot = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: formData.email })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      setMode('reset-verify');
      setTimer(300);
      notify('Reset Code Sent', 'Check your email for the password reset code.');
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const handleResetPassword = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      if (!validatePassword(formData.password)) {
        setError('Password must be 8+ chars, with Uppercase, Number, and Special Char.');
        setLoading(false);
        return;
      }
      const res = await fetch(`${API_BASE}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: formData.email, otp: vCode, newPassword: formData.password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      setMode('login');
      notify('Password Reset', 'Your password has been updated. Please sign in.');
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

  return React.createElement('div', {className: 'auth-overlay'},
    React.createElement('div', {className: 'auth-card'},
      React.createElement('div', {className: 'auth-logo'}, '⚡FlowVolt'),
      React.createElement('div', {className: 'auth-sub'}, 'Decentralized Energy Network'),
      
      (mode === 'login' || mode === 'register') && React.createElement('div', {className: 'auth-tabs'},
        React.createElement('div', {className: `auth-tab ${mode==='login'?'active':''}`, onClick:()=> {setMode('login'); setError('');} }, 'Sign In'),
        React.createElement('div', {className: `auth-tab ${mode==='register'?'active':''}`, onClick:()=> {setMode('register'); setError('');} }, 'Register')
      ),

      (mode === 'verify' || mode === 'reset-verify') ? 
        React.createElement('form', {className: 'auth-form', onSubmit: handleVerify},
          React.createElement('div', {style: {textAlign: 'center', marginBottom: '20px'}}, 
            React.createElement('div', {style: {fontSize: '14px', color: 'var(--muted)'}}, `Enter the 6-digit code sent to`),
            React.createElement('div', {style: {fontWeight: 700, color: 'var(--green)'}}, formData.email),
            timer > 0 ? 
              React.createElement('div', {style: {fontSize: '12px', color: 'var(--amber)', marginTop: '8px'}}, `Expires in ${formatTime(timer)}`) :
              React.createElement('div', {style: {fontSize: '12px', color: 'var(--red)', marginTop: '8px'}}, 'Code Expired')
          ),
          React.createElement('input', {className: 'form-input', style: {textAlign: 'center', fontSize: '24px', letterSpacing: '8px'}, 
            placeholder: '000000', required: true, maxLength: 6,
            value: vCode, onChange: e => setVCode(e.target.value)}),
          error && React.createElement('div', {style: {color: 'var(--red)', fontSize: '13px', textAlign: 'center'}}, error),
          React.createElement('button', {className: 'primary-btn', disabled: loading}, loading ? 'Verifying...' : 'Verify Code'),
          React.createElement('div', {className: 'auth-footer'}, 
            React.createElement('span', {style: {cursor: timer > 240 ? 'not-allowed' : 'pointer', opacity: timer > 240 ? 0.5 : 1, fontSize: '12px'}, onClick: handleResend}, 'Resend OTP'),
            React.createElement('span', {style: {margin: '0 10px', fontSize: '12px'}}, ' | '),
            React.createElement('span', {style: {fontSize: '12px'}, onClick: () => setMode('login')}, 'Cancel')
          )
        ) :
      mode === 'forgot' ?
        React.createElement('form', {className: 'auth-form', onSubmit: handleForgot},
          React.createElement('div', {className: 'form-group'},
            React.createElement('label', {className: 'form-label'}, 'Email Address'),
            React.createElement('input', {className: 'form-input', type: 'email', placeholder: 'name@example.com', required: true,
              value: formData.email, onChange: e => setFormData({...formData, email: e.target.value})})
          ),
          error && React.createElement('div', {style: {color: 'var(--red)', fontSize: '13px', textAlign: 'center'}}, error),
          React.createElement('button', {className: 'primary-btn', disabled: loading}, loading ? 'Sending...' : 'Send Reset Code'),
          React.createElement('div', {className: 'auth-footer'}, 
            React.createElement('span', {onClick: () => setMode('login')}, '← Back to Login')
          )
        ) :
      mode === 'reset' ?
        React.createElement('form', {className: 'auth-form', onSubmit: handleResetPassword},
          React.createElement('div', {className: 'form-group'},
            React.createElement('label', {className: 'form-label'}, 'New Password'),
            React.createElement('input', {className: 'form-input', type: 'password', placeholder: '••••••••', required: true,
              value: formData.password, onChange: e => setFormData({...formData, password: e.target.value})}),
            React.createElement('div', {style: {fontSize: '10px', color: 'var(--muted)', marginTop: '4px'}}, 
              'Min 8 chars, 1 Uppercase, 1 Number, 1 Special Char')
          ),
          error && React.createElement('div', {style: {color: 'var(--red)', fontSize: '13px', textAlign: 'center'}}, error),
          React.createElement('button', {className: 'primary-btn', disabled: loading}, loading ? 'Updating...' : 'Update Password')
        ) :
        React.createElement('form', {className: 'auth-form', onSubmit: handleAuth},
          mode === 'register' && React.createElement('div', {className: 'form-group'},
            React.createElement('label', {className: 'form-label'}, 'Full Name'),
            React.createElement('input', {className: 'form-input', placeholder: 'John Doe', required: true,
              value: formData.name, onChange: e => setFormData({...formData, name: e.target.value})})
          ),
          React.createElement('div', {className: 'form-group'},
            React.createElement('label', {className: 'form-label'}, 'Email Address'),
            React.createElement('input', {className: 'form-input', type: 'email', placeholder: 'name@example.com', required: true,
              value: formData.email, onChange: e => setFormData({...formData, email: e.target.value})})
          ),
          React.createElement('div', {className: 'form-group'},
            React.createElement('div', {style: {display: 'flex', justifyContent: 'space-between'}},
              React.createElement('label', {className: 'form-label'}, 'Password'),
              mode === 'login' && React.createElement('span', {
                style: {fontSize: '11px', color: 'var(--green)', cursor: 'pointer'},
                onClick: () => {setMode('forgot'); setError('');}
              }, 'Forgot Password?')
            ),
            React.createElement('input', {className: 'form-input', type: 'password', placeholder: '••••••••', required: true,
              value: formData.password, onChange: e => setFormData({...formData, password: e.target.value})}),
            mode === 'register' && React.createElement('div', {style: {fontSize: '10px', color: 'var(--muted)', marginTop: '4px'}},

}


function App(){
  const [page,setPage]=useState('dashboard');
  const [wallet,setWallet]=useState(null);
  const [notif,setNotif]=useState(null);
  const [isSepolia, setIsSepolia] = useState(true);
  const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('fv_current')));

  function notify(title,msg){
    setNotif({title,msg});
    setTimeout(()=>setNotif(null),4000);
  }

  const logout = () => {
    localStorage.removeItem('fv_current');
    setUser(null);
    setWallet(null);
    notify('Signed Out', 'You have been disconnected from the grid.');
  };

  const checkNetwork = useCallback(async () => {
    if (window.ethereum) {
      const chainId = await window.ethereum.request({ method: 'eth_chainId' });
      setIsSepolia(chainId === SEPOLIA_CHAIN_ID);
    }
  }, []);

  const connect = async () => {
    if (!window.ethereum) {
      notify('Error', 'MetaMask not detected. Please install the extension.');
      return;
    }
    try {
      const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
      if (accs && accs.length > 0) {
        setWallet(accs[0]);
        notify('Wallet Connected! 🦊', `Connected: ${accs[0].slice(0,6)}...`);
      }
    } catch (e) {
      console.error("Connection failed", e);
      notify('Cancelled', 'MetaMask connection failed or was rejected.');
    }
  };

  useEffect(() => {
    checkNetwork();
    if (window.ethereum) {
      // Auto-connect if already authorized
      window.ethereum.request({ method: 'eth_accounts' })
        .then(accs => { if (accs[0]) setWallet(accs[0]); });

      window.ethereum.on('chainChanged', checkNetwork);
      window.ethereum.on('accountsChanged', (accs) => setWallet(accs[0] || null));
    }
  }, [checkNetwork]);

  const switchNetwork = async () => {
    try {
      await window.ethereum.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: SEPOLIA_CHAIN_ID }],
      });
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: SEPOLIA_CHAIN_ID,
            chainName: 'Sepolia Test Network',
            nativeCurrency: { name: 'Sepolia ETH', symbol: 'ETH', decimals: 18 },
            rpcUrls: ['https://rpc.sepolia.org'],
            blockExplorerUrls: ['https://sepolia.etherscan.io']
          }]
        });
      }
    }
  };

  const nav=[
    {key:'dashboard',icon:'📊',label:'Dashboard'},
    {key:'marketplace',icon:'⚡',label:'Marketplace'},
    {key:'wallet',icon:'🦊',label:'Wallet'},
    {key:'analytics',icon:'📈',label:'Analytics'},
    {key:'audit',icon:'🔍',label:'Audit Log'},
  ];

  const pages={
    dashboard:React.createElement(Dashboard,{wallet, setWallet, isSepolia, switchNetwork, notify}),
    marketplace:React.createElement(Marketplace,{wallet,notify}),
    wallet:React.createElement(WalletPage,{wallet,setWallet,notify}),
    analytics:React.createElement(Analytics,null),
    audit:React.createElement(AuditLog,null),
  };

  if (!user) return React.createElement(React.Fragment, null, 
    React.createElement(Auth, {onAuth: setUser, notify})
  );

  return React.createElement('div',{className:'app'},
    // Sidebar
    React.createElement('nav',{className:'sidebar'},
      React.createElement('div',{className:'logo'},
        React.createElement('div',{className:'logo-mark'},'⚡FlowVolt'),
        React.createElement('div',{className:'logo-sub'},'P2P Energy Market'),
        React.createElement('div', {
          style: {
            fontSize: '9px',
            marginTop: '8px',
            color: isSepolia ? 'var(--green)' : 'var(--red)',
            display: 'flex',
            alignItems: 'center',
            gap: '4px',
            textTransform: 'uppercase',
            letterSpacing: '1px'
          }
        }, 
          React.createElement('div', {
            style: {
              width: '6px',
              height: '6px',
              borderRadius: '50%',
              background: isSepolia ? 'var(--green)' : 'var(--red)'
            }
          }),
          isSepolia ? 'Sepolia Online' : 'Wrong Network'
        )
      ),
      // User Profile Mini
      React.createElement('div', {style: {padding: '16px 24px', borderBottom: '1px solid var(--border)', background: 'var(--panel2)'}},
        React.createElement('div', {style: {fontSize: '12px', fontWeight: 800, color: 'var(--green)'}}, user.name),
        React.createElement('div', {style: {fontSize: '10px', color: 'var(--muted)', marginTop: '2px'}}, `Node: ${user.nodeType}`)
      ),
      React.createElement('div',{className:'nav'},
        nav.map(n=>
          React.createElement('div',{key:n.key,className:`nav-item ${page===n.key?'active':''}`,onClick:()=>setPage(n.key)},
            React.createElement('span',{className:'nav-icon'},n.icon),
            React.createElement('span',null,n.label)
          )
        ),
        React.createElement('div', {className: 'nav-item', onClick: logout, style: {marginTop: 'auto', color: 'var(--red)'}},
          React.createElement('span', {className: 'nav-icon'}, '🚪'),
          React.createElement('span', null, 'Sign Out')
        )
      ),
      React.createElement('div',{className:'wallet-box'},
        !wallet
          ?React.createElement('button',{className:'connect-btn',onClick:connect},'🦊 Connect Wallet')
          :React.createElement('div',null,
            React.createElement('div',{className:'wallet-label'},'Connected'),
            React.createElement('div',{className:'wallet-addr'},shortAddr(wallet)),
            !isSepolia && React.createElement('button', {
              className: 'connect-btn',
              style: {background: 'var(--red)', color: '#fff', marginTop: '10px'},
              onClick: switchNetwork
            }, 'Switch to Sepolia'),
            isSepolia && React.createElement('button',{className:'disconnect-btn',onClick:()=>setWallet(null)},'Disconnect')
          )
      )
    ),
    // Main
    React.createElement('main',{className:'main'},
      pages[page]
    ),
    // Notification
    notif&&React.createElement('div',{className:'notif'},
      React.createElement('div',{className:'notif-title'},notif.title),
      React.createElement('div',{className:'notif-msg'},notif.msg)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
